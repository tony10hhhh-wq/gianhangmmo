    .item-price { font-weight: 800; font-size: 1.6rem; background: linear-gradient(125deg, #FFD58C, #FFA041); -webkit-background-clip: text; background-clip: text; color: transparent; white-space: nowrap; }

    @media (max-width: 900px) {
      .sidebar { position: static; }
      .item-price { white-space: normal; font-size: 1.3rem; }
      .item-row { flex-direction: column; align-items: flex-start; }
    }
  </style>

<body>

    ] },
    gemini: { title: "💎 GEMINI + VEO3", icon: "fa-gem", items: [

    capcut: { title: "🎬 CAPCUT PRO", icon: "fa-video", items: [{ bullet: "🎬", name: "Capcut Pro 35 ngày", desc: "PC, iOS, Android", price: "80.000đ", inStock: true }] },
    expressvpn: { title: "🛡️ EXPRESSVPN", icon: "fa-shield-haltered", items: [{ bullet: "🛡️", name: "EXPRESS VPN 27-32 ngày", price: "8.700đ", inStock: true }] },
    hma: { title: "🔐 HMA VPN", icon: "fa-lock", items: [{ bullet: "🔐", name: "KEY HMA 15-27 ngày", price: "6.100đ", inStock: true }] },

  };
  const order = ["claude","chatgpt","gemini","canva","capcut","expressvpn","hma","grok","tool","kling","netflix","antigravity","youtube","gdrive","purchase","topup","confirm"];
  
  function loadData() {
    const saved = localStorage.getItem("tainguyenmmo_data");
    if(saved) appData = JSON.parse(saved);
  }
  loadData();
  
  const sidebarDiv = document.getElementById("categoryList");
  const mainDiv = document.getElementById("mainContent");
  
  order.forEach(key => {
    const btn = document.createElement("button");
    btn.className = "cat-btn";
    btn.innerHTML = `<i class="fas ${appData[key].icon}"></i> <span>${appData[key].title}</span>`;
    btn.onclick = () => {
      document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderMain(key);
    };
    sidebarDiv.appendChild(btn);
  });
  if(sidebarDiv.firstChild) sidebarDiv.firstChild.classList.add("active");
  
  function renderMain(catKey) {
    const section = appData[catKey];
    let itemsHtml = '';
    section.items.forEach(it => {
      if(it.isBank) {
        itemsHtml += `<div class="price-item bank-card"><div class="bank-inner"><div style="font-weight:800;">🏦 MB BANK</div><div>CHỦ TK: NGUYEN VAN HOA</div><div class="account-number">9125112008</div><div>Nội dung: <strong>Tên + SĐT</strong></div></div></div>`;
      } else {
        const stockClass = (it.inStock === false) ? "out-of-stock" : "";
        itemsHtml += `
          <div class="price-item ${stockClass}">
            <div class="item-row">
              <div class="item-name"><span class="bullet">${it.bullet || "•"}</span><span>${it.name}</span>${it.note ? `<span style="font-size:0.75rem;opacity:0.7;">${it.note}</span>` : ''}</div>
              <div class="item-price">${it.price || ""}</div>
            </div>
            ${it.desc ? `<div class="desc-text">${it.desc}</div>` : ''}
            ${it.inStock === false ? `<div style="margin-top:8px;color:#ff8888;"><i class="fas fa-ban"></i> Tạm thời hết hàng</div>` : ''}
          </div>
        `;
      }
    });
    mainDiv.innerHTML = `<div class="section-card"><div class="section-header"><div class="icon"><i class="fas ${section.icon}"></i></div><h2>${section.title}</h2></div><div class="items-grid">${itemsHtml}</div></div>`;
  }
  renderMain(order[0]);
</script>
