    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse at 20% 30%, #0c0f1e, #03050b);
      font-family: 'Inter', sans-serif;
      color: #eceff8;
      padding: 32px 24px;
      min-height: 100vh;
    }

    .glow-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .glow-bg::before, .glow-bg::after {
      content: "";
      position: absolute;
      width: 60%;
      height: 60%;
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0.4;
    }
    .glow-bg::before { background: #bd7b2c; top: -20%; left: -20%; }
    .glow-bg::after { background: #1e4b7c; bottom: -20%; right: -20%; }

    .container { max-width: 1600px; margin: 0 auto; position: relative; z-index: 2; }

    .hero { text-align: center; margin-bottom: 48px; }
    .hero h1 {
      font-size: clamp(44px, 8vw, 88px); font-weight: 800;
      background: linear-gradient(135deg, #FFE6B0 0%, #FFB347 60%, #FF8C42 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      margin-bottom: 12px;
    }
    .brand {
      display: inline-flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.06); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,180,70,0.4); padding: 12px 32px; border-radius: 80px;
      font-size: 1.7rem; font-weight: 700; color: #FFD966;
    }

    .dashboard { display: flex; gap: 28px; flex-wrap: wrap; }
    .sidebar {
      flex: 1.1; min-width: 270px;
      background: rgba(12,18,32,0.55); backdrop-filter: blur(14px);
      border-radius: 44px; border: 1px solid rgba(255,200,100,0.25);
      padding: 24px 12px; height: fit-content; position: sticky; top: 28px;
    }
    .main { flex: 3.5; min-width: 280px; }

    .cat-btn {
      display: flex; align-items: center; gap: 14px; background: transparent;
      border: none; font-family: 'Inter'; font-size: 1rem; font-weight: 600;
      padding: 14px 20px; border-radius: 24px; color: #cdd9ff; cursor: pointer;
      width: 100%; text-align: left; transition: 0.2s;
    }
    .cat-btn i { width: 28px; font-size: 1.3rem; }
    .cat-btn:hover { background: rgba(255,190,80,0.12); color: #FFDE9C; transform: translateX(4px); }
    .cat-btn.active { background: linear-gradient(95deg, #e09d3e20, #ffb34720); border-left: 3px solid #FFB347; color: #FFE2A4; }

    .section-card {
      background: rgba(10,14,27,0.65); backdrop-filter: blur(16px);
      border-radius: 44px; border: 1px solid rgba(255,200,130,0.25);
      margin-bottom: 32px; overflow: hidden;
    }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 28px; background: linear-gradient(135deg, rgba(255,185,70,0.18), rgba(220,110,30,0.08));
      border-bottom: 1px solid rgba(255,180,70,0.3);
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-left .icon { width: 52px; height: 52px; background: rgba(255,170,70,0.2); border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    .header-left h2 { font-size: 1.9rem; font-weight: 700; background: linear-gradient(120deg, #fff3cf, #ffcd94); -webkit-background-clip: text; background-clip: text; color: transparent; }

    .items-grid { padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
    .price-item {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,200,120,0.2);
      border-radius: 28px; padding: 18px 22px; transition: 0.2s;
    }
    .price-item.out-of-stock { opacity: 0.65; background: rgba(80,40,40,0.2); border-color: #ff6b6b40; }
    .price-item.out-of-stock .item-price { text-decoration: line-through; opacity: 0.6; }
    .item-row { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 16px; }
    .item-name { font-weight: 600; font-size: 1.05rem; display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; flex: 1; }
    .item-price { font-weight: 800; font-size: 1.6rem; background: linear-gradient(125deg, #FFD58C, #FFA041); -webkit-background-clip: text; background-clip: text; color: transparent; white-space: nowrap; }
    .desc-text { margin-top: 12px; font-size: 0.85rem; color: #aab3e6; padding-left: 30px; }
    
    /* Admin controls */
    .admin-controls { display: flex; gap: 12px; align-items: center; margin-top: 12px; justify-content: flex-end; border-top: 1px solid rgba(255,200,100,0.2); padding-top: 12px; flex-wrap: wrap; }
    .stock-toggle { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; background: #1e243e; padding: 5px 12px; border-radius: 40px; cursor: pointer; }
    .edit-btn, .delete-btn { background: none; border: none; color: #ffcd94; cursor: pointer; font-size: 0.9rem; padding: 5px 10px; border-radius: 30px; transition: 0.2s; }
    .edit-btn:hover, .delete-btn:hover { background: #ffb34730; color: #FFB347; }
    .add-product-btn { background: rgba(255,180,70,0.2); border: 1px dashed #FFB347; color: #FFD966; padding: 12px; border-radius: 28px; text-align: center; cursor: pointer; margin-top: 8px; font-weight: 600; }
    
    .bank-card { background: linear-gradient(145deg, #2b2218, #1f1910); border: 1px solid #ffbe6e; }
    .bank-inner { background: #fef7e8; border-radius: 28px; padding: 24px; color: #2a2418; }
    .account-number { font-size: 2rem; font-weight: 800; font-family: monospace; background: #eee4d4; display: inline-block; padding: 8px 20px; border-radius: 60px; margin: 12px 0; }

    /* Nút admin floating */
    .admin-float-btn {
      position: fixed; bottom: 24px; right: 24px;
      background: #ffb347; color: #1a1a2e; width: 56px; height: 56px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      z-index: 1000; transition: 0.2s; border: none;
    }
    .admin-float-btn:hover { transform: scale(1.05); background: #ffcc66; }
    
    /* Modal login & edit */
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 1100;
      align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #151e2c; border-radius: 40px; padding: 32px; width: 90%; max-width: 450px;
      border: 1px solid #FFB347;
    }
    .modal-content input, .modal-content select, .modal-content textarea {
      width: 100%; padding: 12px; margin: 8px 0; border-radius: 20px; border: none;
      background: #0b1020; color: white; font-family: inherit;
    }
    .modal-content button { background: #FFB347; border: none; padding: 12px 24px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-right: 12px; margin-top: 12px; }
    .suggest-icons { display: flex; gap: 12px; flex-wrap: wrap; margin: 12px 0; }
    .suggest-icon { font-size: 1.8rem; cursor: pointer; padding: 6px 12px; border-radius: 50px; background: #2a2f45; transition: 0.1s; }
    .suggest-icon:hover { background: #ffb347; transform: scale(1.1); }

    .contact-section {
      margin-top: 28px;
      border-top: 1px solid rgba(255,200,100,0.3);
      padding-top: 20px;
    }
    .contact-title {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #FFB347;
      margin-bottom: 16px;
      text-align: center;
    }
    .zalo-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #0066ff20;
      border: 1px solid #0066ff;
      border-radius: 60px;
      padding: 12px 16px;
      margin-bottom: 12px;
      text-decoration: none;
      color: #ffdd99;
      font-weight: 600;
      transition: 0.2s;
    }
    .zalo-btn:hover { background: #0066ff40; transform: scale(1.02); }
    .zalo-btn i { font-size: 1.5rem; color: #0066ff; }
    .group-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #1f6b3e20;
      border: 1px solid #2d9b5e;
      border-radius: 60px;
      padding: 12px 16px;
      text-decoration: none;
      color: #ffdd99;
      font-weight: 600;
      transition: 0.2s;
    }
    .group-btn:hover { background: #2a9d8f30; transform: scale(1.02); }
    .group-btn i { font-size: 1.5rem; color: #2d9b5e; }

    @media (max-width: 900px) {
      .sidebar { position: static; }
      .item-price { white-space: normal; font-size: 1.3rem; }
      .item-row { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<div class="glow-bg"></div>
<div id="appRoot"></div>

<button class="admin-float-btn" id="adminFloatBtn"><i class="fas fa-user-lock"></i></button>

<!-- Modal Login -->

                <button class="delete-btn" data-action="delete" data-idx="${idx}"><i class="fas fa-trash-alt"></i> Xóa</button>
              </div>
            ` : (it.inStock === false ? `<div style="margin-top:8px; color:#ff8888;"><i class="fas fa-ban"></i> Tạm thời hết hàng</div>` : '')}
          </div>
        `;
      }
    });
    
    if(isAdmin) itemsHtml += `<div class="add-product-btn" id="adminAddBtn"><i class="fas fa-plus-circle"></i> + Thêm sản phẩm mới</div>`;
    
    mainDiv.innerHTML = `<div class="section-card"><div class="section-header"><div class="header-left"><div class="icon"><i class="fas ${section.icon}"></i></div><h2>${section.title}</h2></div></div><div class="items-grid">${itemsHtml}</div></div>`;
    
    if(isAdmin) {
      document.querySelectorAll(".stock-toggle").forEach(el => el.addEventListener("click", () => toggleStock(catKey, parseInt(el.dataset.idx))));
      document.querySelectorAll(".edit-btn").forEach(btn => btn.addEventListener("click", () => openEditModal(catKey, parseInt(btn.dataset.idx))));
      document.querySelectorAll(".delete-btn").forEach(btn => btn.addEventListener("click", () => { if(confirm("Xóa?")) deleteProduct(catKey, parseInt(btn.dataset.idx)); }));
      const addBtn = document.getElementById("adminAddBtn");
      if(addBtn) addBtn.onclick = () => openAddModal(catKey);
    }
  }
  
  function toggleStock(catKey, idx) {
    const item = appData[catKey].items[idx];
    if(item && !item.isBank) { item.inStock = !item.inStock; saveData(appData); renderMainContent(currentCategory); }
  }
  function deleteProduct(catKey, idx) { appData[catKey].items.splice(idx,1); saveData(appData); renderMainContent(currentCategory); }
  
  function openEditModal(catKey, idx) {
    editContext = { categoryKey: catKey, itemIndex: idx };
    const item = appData[catKey].items[idx];
    document.getElementById("editBullet").value = item.bullet || "✨";
    document.getElementById("editName").value = item.name;
    document.getElementById("editDesc").value = item.desc || "";
    document.getElementById("editPrice").value = item.price;
    document.getElementById("editNote").value = item.note || "";
    document.getElementById("editModal").classList.add("active");
  }
  
  function openAddModal(catKey) {
    editContext = { categoryKey: catKey, itemIndex: null };
    document.getElementById("editBullet").value = "✨";
    document.getElementById("editName").value = "";
    document.getElementById("editDesc").value = "";
    document.getElementById("editPrice").value = "";
    document.getElementById("editNote").value = "";
    document.getElementById("editModal").classList.add("active");
  }
  
  document.getElementById("saveEditBtn").onclick = () => {
    const bullet = document.getElementById("editBullet").value.trim() || "✨";
    const name = document.getElementById("editName").value.trim();
    if(!name) { alert("Vui lòng nhập tên sản phẩm"); return; }
    const desc = document.getElementById("editDesc").value;
    const price = document.getElementById("editPrice").value;
    const note = document.getElementById("editNote").value;
    
    if(editContext.itemIndex !== null) {
      const item = appData[editContext.categoryKey].items[editContext.itemIndex];
      item.bullet = bullet;
      item.name = name;
      if(desc) item.desc = desc; else delete item.desc;
      item.price = price;
      if(note) item.note = note; else delete item.note;
    } else {
      appData[editContext.categoryKey].items.push({ bullet, name, desc: desc || undefined, price, note: note || undefined, inStock: true });
    }
    saveData(appData);
    document.getElementById("editModal").classList.remove("active");
    renderMainContent(currentCategory);
  };
  document.getElementById("cancelEditBtn").onclick = () => document.getElementById("editModal").classList.remove("active");
  
  // Login logic
  const floatBtn = document.getElementById("adminFloatBtn");
  const loginModal = document.getElementById("loginModal");
  floatBtn.onclick = () => {
    if(isAdmin) { if(confirm("Đăng xuất?")) { isAdmin=false; localStorage.removeItem("tainguyenmmo_admin"); renderApp(); } }
    else loginModal.classList.add("active");
  };
  document.getElementById("submitLoginBtn").onclick = () => {
    const pass = document.getElementById("adminPasswordInput").value;
    if(pass === ADMIN_PASSWORD) { isAdmin=true; localStorage.setItem("tainguyenmmo_admin","true"); loginModal.classList.remove("active"); renderApp(); }
    else alert("Sai mật khẩu!");
  };
  loginModal.onclick = (e) => { if(e.target === loginModal) loginModal.classList.remove("active"); };
  
  renderApp();
</script>
</body>
</html>
