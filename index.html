  <style>
    :root {
      --bg1: #87c7ff;
      --bg2: #d8efff;
      --card: rgba(255,255,255,.88);
      --text: #20233a;
      --muted: #5d6282;
      --accent: #ff6b35;
      --shadow: 0 18px 40px rgba(56, 72, 140, .18);
      --radius: 26px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: 'Be Vietnam Pro', system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.8), transparent 20%),
        radial-gradient(circle at 80% 10%, rgba(255,255,255,.7), transparent 18%),
        radial-gradient(circle at 75% 40%, rgba(255,255,255,.55), transparent 16%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height: 100vh;
    }

    .clouds {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      opacity: .55;
    }
    .cloud {
      position: absolute;
      background: rgba(255,255,255,.78);
      filter: blur(1px);
      border-radius: 999px;
      box-shadow:
        40px 10px 0 10px rgba(255,255,255,.74),
        -35px 8px 0 8px rgba(255,255,255,.7),
        5px -12px 0 12px rgba(255,255,255,.78);
    }
    .cloud.c1 { width: 120px; height: 42px; top: 90px; left: 6%; }
    .cloud.c2 { width: 160px; height: 50px; top: 140px; right: 10%; }
    .cloud.c3 { width: 140px; height: 44px; top: 360px; left: 68%; }
    .cloud.c4 { width: 180px; height: 54px; top: 760px; left: 12%; }

    .wrap {
      width: min(1450px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 60px;
      position: relative;
      z-index: 1;
    }

    .hero {
      text-align: center;
      margin-bottom: 28px;
    }
    .hero h1 {
      margin: 0;
      font-size: clamp(42px, 7vw, 84px);
      font-weight: 800;
      letter-spacing: 1px;
      color: #ffd978;
      text-shadow:
        0 3px 0 #8d2d11,
        0 6px 0 #b73b15,
        0 10px 28px rgba(120, 40, 10, .38);
      -webkit-text-stroke: 2px #b03a16;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 14px;
      padding: 14px 34px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ff8b5f, #ef5b2a);
      color: white;
      font-size: clamp(24px, 3vw, 38px);
      font-weight: 800;
      box-shadow: var(--shadow);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 28px 0 34px;
    }
    .chip {
      border: 0;
      border-radius: 16px;
      padding: 14px 22px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(0,0,0,.1);
      color: #fff;
      transition: transform .18s ease, filter .18s ease;
    }
    .chip:hover, .chip.active { transform: translateY(-2px); filter: saturate(1.08); }

    .all { background: linear-gradient(180deg, #ffe88f, #ffcd42); color: #513300; }
    .chatgpt { background: linear-gradient(180deg, #f28a53, #c25c22); }
    .gemini { background: linear-gradient(180deg, #56d0ea, #258fcb); }
    .canva { background: linear-gradient(180deg, #39cde2, #0e99d7); }
    .capcut { background: linear-gradient(180deg, #7ac65f, #4e9a38); }
    .expressvpn { background: linear-gradient(180deg, #ff7b78, #de3b31); }
    .hma { background: linear-gradient(180deg, #ffcc68, #d98c18); color: #4c2b00; }
    .grok { background: linear-gradient(180deg, #7c7cff, #4f53db); }
    .tool { background: linear-gradient(180deg, #c080ff, #8649db); }
    .kling { background: linear-gradient(180deg, #68d8a7, #249b6c); }
    .netflix { background: linear-gradient(180deg, #ff5b5b, #c91d1d); }
    .antigravity { background: linear-gradient(180deg, #7cc8ff, #3368d8); }
    .youtube { background: linear-gradient(180deg, #ff7c9a, #db2f5c); }
    .gdrive { background: linear-gradient(180deg, #6db7ff, #2d73e0); }
    .purchase { background: linear-gradient(180deg, #ffb15c, #e57b21); }
    .topup { background: linear-gradient(180deg, #ff6b6b, #b72b2b); }
    .confirm { background: linear-gradient(180deg, #8c7bff, #5a47dc); }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
      align-items: start;
    }

    .section {
      background: var(--card);
      border: 1px solid rgba(255,255,255,.65);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 22px;
      color: white;
      font-weight: 800;
      font-size: clamp(20px, 2vw, 30px);
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .section-header .icon {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: rgba(255,255,255,.22);
      font-size: 22px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.22);
      flex: 0 0 auto;
    }

    .head-chatgpt { background: linear-gradient(90deg, #ef9058, #c75b1e); }
    .head-gemini { background: linear-gradient(90deg, #4fd5e5, #2090cf); }
    .head-canva { background: linear-gradient(90deg, #37cce4, #0795d8); }
    .head-capcut { background: linear-gradient(90deg, #76c75c, #4d9d36); }
    .head-expressvpn { background: linear-gradient(90deg, #ff7e7c, #dd3f33); }
    .head-hma { background: linear-gradient(90deg, #ffc95d, #da8c1a); color: #4c2b00; }
    .head-grok { background: linear-gradient(90deg, #7e7bff, #4f56df); }
    .head-tool { background: linear-gradient(90deg, #b883ff, #854dd8); }
    .head-kling { background: linear-gradient(90deg, #62d4a2, #249b6c); }
    .head-netflix { background: linear-gradient(90deg, #ff6868, #c81d1d); }
    .head-antigravity { background: linear-gradient(90deg, #79caff, #335fd8); }
    .head-youtube { background: linear-gradient(90deg, #ff839f, #d92f59); }
    .head-gdrive { background: linear-gradient(90deg, #71baff, #2d73e0); }
    .head-purchase { background: linear-gradient(90deg, #ffb15c, #e57b21); }
    .head-topup { background: linear-gradient(90deg, #ff6b6b, #b72b2b); }
    .head-confirm { background: linear-gradient(90deg, #8c7bff, #5a47dc); }

    .content {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .item {
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(216, 222, 255, .8);
      border-radius: 22px;
      padding: 18px 20px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.8);
    }

    .topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }
    .name {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-size: clamp(18px, 1.35vw, 23px);
      line-height: 1.45;
      font-weight: 700;
      flex: 1;
    }
    .bullet { font-size: 18px; margin-top: 4px; }
    .price {
      flex: 0 0 auto;
      color: var(--accent);
      font-size: clamp(22px, 1.7vw, 34px);
      line-height: 1.1;
      font-weight: 800;
      white-space: nowrap;
      text-align: right;
    }
    .desc {
      margin: 0;
      padding-left: 31px;
      color: var(--muted);
      font-size: clamp(15px, 1.05vw, 19px);
      line-height: 1.7;
    }

    .footer {
      margin-top: 30px;
      text-align: center;
      color: #415178;
      font-size: 15px;
      font-weight: 600;
      opacity: .9;
    }

    .bank-box {
      background: linear-gradient(180deg, #c92c2c, #8f1d1d);
      color: white;
      border: 0;
    }
    .bank-inner {
      background: rgba(255,255,255,.96);
      color:#20233a;
      border-radius: 22px;
      padding: 18px;
    }

    @media (max-width: 1100px) {
      .grid { grid-template-columns: 1fr; }
      .price { white-space: normal; }
    }

    @media (max-width: 720px) {
      .wrap { width: min(100% - 16px, 100%); padding-top: 20px; }
      .toolbar { justify-content: flex-start; }
      .chip { padding: 12px 16px; border-radius: 14px; }
      .section-header { padding: 16px 18px; }
      .content { padding: 14px; }
      .item { padding: 16px; border-radius: 18px; }
      .topline { flex-direction: column; }
      .price { text-align: left; }
      .name { font-size: 17px; }
      .desc { padding-left: 28px; font-size: 14px; }
    }
  </style>
</head>
